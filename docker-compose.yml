services:
  ttc-discord-bot:
    build: .
    container_name: ttc-discord-live-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ttc-cache:/app/.data

  ttc-live-test-bot:
    build: .
    container_name: ttc-discord-live-test-bot
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c 'if [ -z "$$TEST_DISCORD_TOKEN" ]; then
        echo "TEST_DISCORD_TOKEN not set; live test scheduler disabled.";
        sleep infinity;
      fi;
      while true; do
        node scripts/live-test-bot.mjs || true;
        sleep 900;
      done'

volumes:
  ttc-cache:
